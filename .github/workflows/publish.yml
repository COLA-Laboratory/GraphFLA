name: Publish to PyPI

# Release by pushing a version tag, e.g.  git tag v0.3.1 && git push origin v0.3.1
# Authentication uses PyPI Trusted Publishing (OIDC) -- no token or 2FA needed.
# Activate once by registering this workflow as a trusted publisher on PyPI:
#   https://pypi.org/manage/project/graphfla/settings/publishing/
#   Owner: COLA-Laboratory | Repo: GraphFLA | Workflow: publish.yml | Environment: pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/graphfla/
    permissions:
      id-token: write # REQUIRED for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
